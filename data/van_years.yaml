# Year-by-year replay of the US map (/map/) — the "Replay the years" button
# on the drive's closing card, which re-inks the lower 48 one year at a time.
#
# The button appears automatically once `years:` below is uncommented and at
# least one year lists states. Put each state in the year you FIRST drove it;
# every state you list inks in when its year comes up. States you leave out
# stay pale during the replay, so list all 48 for the full effect.
#
# State names, exactly as the map knows them (copy-paste from here):
#   Alabama, Arizona, Arkansas, California, Colorado, Connecticut, Delaware,
#   Florida, Georgia, Idaho, Illinois, Indiana, Iowa, Kansas, Kentucky,
#   Louisiana, Maine, Maryland, Massachusetts, Michigan, Minnesota,
#   Mississippi, Missouri, Montana, Nebraska, Nevada, New Hampshire,
#   New Jersey, New Mexico, New York, North Carolina, North Dakota, Ohio,
#   Oklahoma, Oregon, Pennsylvania, Rhode Island, South Carolina,
#   South Dakota, Tennessee, Texas, Utah, Vermont, Virginia, Washington,
#   West Virginia, Wisconsin, Wyoming
#
# Years below were reconstructed July 2026 from the EXIF dates + GPS in the
# original photos in mitmfolder (the site copies are stripped; the originals
# never were). Each state sits in the earliest year a geotagged photo puts
# you inside it. 37 of the 48 have photo evidence.
#
# STILL NEEDS YOUR MEMORY — 11 states have no geotagged photos, so they're
# not listed yet and will stay pale during the replay until you slot them in:
#   Alabama, Connecticut, Delaware, Indiana, Iowa, Mississippi, Nebraska,
#   New Hampshire, Ohio, Texas, West Virginia
# (Most were probably drive-through states on the big 2019 CO->FL->Maine->
# NY->CO loop, or the 2024 Great Lakes/Dakotas run.)
#
# NOTE: 2016–2017 below come from the pre-van roadtrip photos (Colorado/Utah
# 2016, Arizona/Oregon 2017) — you drove them together, but before the van.
# If you want the replay to start with the van era, move those four states
# into 2018 and delete the 2016/2017 lines.

years:
  - { year: 2016, states: [Colorado, Utah] }
  - { year: 2017, states: [Arizona, Oregon] }
  - { year: 2018, states: [Wyoming] }
  - { year: 2019, states: [Arkansas, Florida, Georgia, Kansas, Kentucky, Louisiana, Maine, Massachusetts, Missouri, New York, North Carolina, Oklahoma, Pennsylvania, Rhode Island, South Carolina, Tennessee, Vermont, Virginia] }
  - { year: 2020, states: [] } # no new states in the photo record — repeat CO/UT/AZ year
  - { year: 2021, states: [Montana, New Mexico] }
  - { year: 2022, states: [California, Idaho, Nevada, Washington] }
  - { year: 2023, states: [Illinois] }
  - { year: 2024, states: [Maryland, Michigan, Minnesota, New Jersey, North Dakota, South Dakota, Wisconsin] }
  - { year: 2025, states: [] } # no geotagged photos from 2025 at all — fill from memory if anywhere new
