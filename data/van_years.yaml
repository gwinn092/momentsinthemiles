# Year-by-year replay of the US map (/map/) — the "Replay the years" button
# on the drive's closing card, which re-inks the lower 48 one year at a time.
#
# The button appears automatically once `years:` below is uncommented and at
# least one year lists states. Put each state in the year you FIRST drove it;
# every state you list inks in when its year comes up. States you leave out
# stay pale during the replay, so list all 48 for the full effect.
