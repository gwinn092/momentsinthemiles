baseURL = "https://www.momentsinthemiles.com/"
languageCode = "en-us"
title = "Moments in the Miles"
theme = "moments"
paginate = 10

[params]
  tagline = "Stories shaped by distance. Perspective earned by miles."
  description = "A reflective travel and lifestyle blog — part lived journal, part practical guide. Eight years of van life, all 48 continental states, eight months across Southeast Asia."
  author = "Jesse & Karlee"
  googleAnalyticsID = "G-191K9XLXV2"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# static/images is also mounted into assets so templates can generate
# responsive srcset variants; declaring any mount replaces the defaults,
# so every standard directory must be re-declared here.
[module]
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static/images"
    target = "assets/images"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"

[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    name = "Start Here"
    url = "/start-here/"
    weight = 1
  [[menus.main]]
    name = "Essays"
    url = "/essays/"
    weight = 2
  [[menus.main]]
    name = "Guides"
    url = "/guides/"
    weight = 3
  [[menus.main]]
    name = "Van Life"
    url = "/van-life/"
    weight = 4
  [[menus.main]]
    name = "Gallery"
    url = "/gallery/"
    weight = 5
  [[menus.main]]
    name = "The Map"
    url = "/map/"
    weight = 6
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 7
  [[menus.main]]
    name = "Reduce Friction"
    url = "/reduce-friction/"
    weight = 8
