{{ define "main" }}
{{ with .Params.hero_image }}
<section class="section-hero">
  <img src="{{ $.Site.Home.RelPermalink }}{{ strings.TrimPrefix "/" . }}" alt="{{ $.Title }}" class="section-hero__img" loading="eager">
  <div class="section-hero__overlay">
    <div class="container-wide section-hero__content">
      <span class="eyebrow">Gallery</span>
      <h1>{{ $.Title }}</h1>
      {{ with $.Description }}<p class="section-hero__desc">{{ . }}</p>{{ end }}
    </div>
  </div>
</section>
{{ end }}

{{ with .Content }}
<div class="list-intro">
  <div class="list-intro__inner">{{ . }}</div>
</div>
{{ end }}

<div class="post-list">
  <div class="container-wide">
    <div class="gallery-filter" role="group" aria-label="Filter photos by chapter">
      <button type="button" class="gallery-filter__btn is-active" data-filter="all" aria-pressed="true">All</button>
      <button type="button" class="gallery-filter__btn" data-filter="van" aria-pressed="false">Van Life</button>
      <button type="button" class="gallery-filter__btn" data-filter="west" aria-pressed="false">American West</button>
      <button type="button" class="gallery-filter__btn" data-filter="asia" aria-pressed="false">Southeast Asia</button>
    </div>
    <div class="gallery-grid">
      {{ range .Params.gallery }}
      {{ $src := printf "%s%s" $.Site.Home.RelPermalink (strings.TrimPrefix "/" .src) }}
      <button type="button" class="gallery-item" data-cat="{{ .cat | default "all" }}" data-full="{{ $src }}" data-caption="{{ .alt }}" aria-label="View larger: {{ .alt }}">
        <img src="{{ $src }}" alt="{{ .alt }}" loading="lazy">
        <span class="gallery-item__cap">{{ .alt }}</span>
      </button>
      {{ end }}
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <button type="button" class="lightbox__close" aria-label="Close">&times;</button>
  <button type="button" class="lightbox__nav lightbox__nav--prev" aria-label="Previous photo">&larr;</button>
  <button type="button" class="lightbox__nav lightbox__nav--next" aria-label="Next photo">&rarr;</button>
  <figure class="lightbox__figure">
    <img class="lightbox__img" src="" alt="">
    <figcaption class="lightbox__caption"></figcaption>
    <span class="lightbox__count"></span>
  </figure>
</div>
{{ end }}
