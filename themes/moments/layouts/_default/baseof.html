<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body{{ if .IsHome }} class="is-home"{{ end }}>
  <a class="skip-link" href="#main-content">Skip to content</a>
  {{ partial "header.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
