<header class="site-header">
  <div class="container">
    <a href="{{ .Site.Home.RelPermalink }}" class="site-logo">Moments in the Miles</a>
    <div class="header-right">
      <nav class="site-nav" id="site-nav">
        <ul>
          {{ range .Site.Menus.main }}
          <li>
            <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} aria-current="page"{{ end }}>{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>
      </nav>
      <button class="search-toggle" aria-label="Search the site" data-index="{{ .Site.Home.RelPermalink }}index.json">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
